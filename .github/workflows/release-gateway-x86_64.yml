name: Release gateway-x86_64

on:
  push:
    tags: ['v*']
  workflow_dispatch:
    inputs:
      version:
        description: 'Release version (e.g. 0.4.0)'
        required: true

permissions:
  contents: write
  packages: write

jobs:
  build:
    timeout-minutes: 180
    runs-on: ubuntu-latest
    env:
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.24"
      - name: Set up SSH Keys
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_KEY_CPM }}" > ~/.ssh/id_cpm && chmod 600 ~/.ssh/id_cpm
          echo "${{ secrets.SSH_KEY_COGNITIVEOSD }}" > ~/.ssh/id_cogd && chmod 600 ~/.ssh/id_cogd
          echo "${{ secrets.SSH_KEY_CLI }}" > ~/.ssh/id_cli && chmod 600 ~/.ssh/id_cli
          echo "${{ secrets.SSH_KEY_INFERENCE }}" > ~/.ssh/id_inf && chmod 600 ~/.ssh/id_inf
          echo "${{ secrets.SSH_KEY_CORE_MCP_BRIDGES }}" > ~/.ssh/id_bridges && chmod 600 ~/.ssh/id_bridges
          echo "${{ secrets.SSH_KEY_COGNITIVEOS_DISTRO }}" > ~/.ssh/id_dist && chmod 600 ~/.ssh/id_dist
          ssh-add ~/.ssh/id_cpm ~/.ssh/id_cogd ~/.ssh/id_cli ~/.ssh/id_inf ~/.ssh/id_bridges ~/.ssh/id_dist
      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      - name: Build release assets
        env:
          CGO_ENABLED: "1"
        run: make release-variant ARCH=x86_64 CLASS=gateway
      - name: Build Docker image
        env:
          CGO_ENABLED: "1"
        run: make docker-release-arch ARCH=x86_64 CLASS=gateway
      - name: Push Docker image
        run: make docker-push-arch ARCH=x86_64 CLASS=gateway
      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: distro-gateway-x86_64
          path: output/
      - name: Publish .cgp packages to registry
        env:
          REGISTRY_URL: ${{ secrets.REGISTRY_URL || 'https://registry-us-all-distros-official.cognitive-os.org/v1' }}
          REGISTRY_TOKEN: ${{ secrets.REGISTRY_TOKEN }}
        run: make publish-all-safe

  release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          name: distro-gateway-x86_64
          path: output/
      - name: Generate checksums
        working-directory: output
        run: sha256sum -- * > SHA256SUMS
      - name: Append to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: CognitiveOS ${{ github.ref_name }}
          body: |
            ## CognitiveOS ${{ github.ref_name }}
            ### x86_64 Artifacts
            - `cognitiveos-*.iso` — bootable x86_64 ISO image
            - `cognitiveos-distro-*.tar.gz` — portable distro tarball
            - `SHA256SUMS` — integrity checksums
            ### Docker Image
            Published to `ghcr.io/cognitiveos-project/cognitiveos:${{ github.ref_name }}-gateway-x86_64`
            ```
            docker pull ghcr.io/cognitiveos-project/cognitiveos:${{ github.ref_name }}-gateway-x86_64
            ```
          files: output/*
