name: Release gateway-x86_64

on:
  push:
    tags: ['v*']
  workflow_dispatch:
    inputs:
      version:
        description: 'Release version (e.g. 0.4.0)'
        required: true

permissions:
  contents: write
  packages: write

jobs:
  build:
    timeout-minutes: 180
    runs-on: ubuntu-latest
    env:
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-go@v5
        with:
          go-version: "1.26"
      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      - name: Build release assets
        env:
          CGO_ENABLED: "1"
          VERSION: ${{ github.event.inputs.version && format('v{0}', github.event.inputs.version) || github.ref_name }}
        run: make release-variant ARCH=x86_64 CLASS=gateway
      - name: Build Docker image
        env:
          CGO_ENABLED: "1"
          VERSION: ${{ github.event.inputs.version && format('v{0}', github.event.inputs.version) || github.ref_name }}
        run: make docker-release-arch ARCH=x86_64 CLASS=gateway
      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Push Docker image
        run: make docker-push-arch ARCH=x86_64 CLASS=gateway
      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: distro-gateway-x86_64
          path: output/
      - name: Publish .cgp packages to registry
        env:
          REGISTRY_URL: ${{ secrets.REGISTRY_URL || 'https://registry-us-all-distros-official.cognitive-os.org/v1' }}
          REGISTRY_TOKEN: ${{ secrets.REGISTRY_TOKEN }}
        run: make publish-all-safe

  release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          name: distro-gateway-x86_64
          path: output/
      - name: Generate checksums
        working-directory: output
        run: sha256sum -- * > SHA256SUMS
      - name: Append to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event.inputs.version && format('v{0}', github.event.inputs.version) || github.ref_name }}
          name: CognitiveOS ${{ github.event.inputs.version && format('v{0}', github.event.inputs.version) || github.ref_name }}
          body: |
            ## CognitiveOS ${{ github.ref_name }}
            ### x86_64 Artifacts
            - `cognitiveos-*.iso` — bootable x86_64 ISO image
            - `cognitiveos-alpine-distro-*.tar.gz` — portable distro tarball
            - `SHA256SUMS` — integrity checksums
            ### Docker Image
            Published to `ghcr.io/cognitiveos-project/cognitiveos:${{ github.ref_name }}-gateway-x86_64`
            ```
            docker pull ghcr.io/cognitiveos-project/cognitiveos:${{ github.ref_name }}-gateway-x86_64
            ```
          files: output/*
