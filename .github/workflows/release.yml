name: Release

on:
  workflow_run:
    workflows:
      - "Release standard-x86_64"
      - "Release edge-aarch64"
      - "Release edge-armv7"
      - "Release gateway-x86_64"
      - "Release micro-armv7"
    types: [completed]
  workflow_dispatch:
    inputs:
      version:
        description: 'Release version (e.g. 0.4.0)'
        required: true

permissions:
  contents: write
  actions: write

jobs:
  trigger-variants:
    if: github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Trigger variant workflows
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          for wf in "Release standard-x86_64" "Release titan-aarch64" "Release edge-aarch64" "Release edge-armv7" "Release gateway-x86_64" "Release micro-armv7"; do
            echo "Triggering $wf..."
            gh workflow run "$wf" -f version=${{ github.event.inputs.version }}
          done

  release:
    if: github.event_name == 'workflow_run' && github.event.workflow_run.conclusion == 'success'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Wait for all variant artifacts
        run: |
          EXPECTED=5
          for i in $(seq 1 60); do
            COUNT=$(gh api repos/${{ github.repository }}/actions/runs \
              --jq "[.workflow_runs[] | select(.conclusion==\"success\" and .head_branch==\"${{ github.event.workflow_run.head_branch }}\")] | length")
            if [ "$COUNT" -ge "$EXPECTED" ]; then
              echo "All $EXPECTED variant builds completed"
              exit 0
            fi
            echo "Waiting for all variants ($COUNT/$EXPECTED)..."
            sleep 60
          done
          echo "Timed out waiting for all variants"
          exit 1

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: distro-*
          path: output/
          merge-multiple: true

      - name: Generate checksums
        working-directory: output
        run: sha256sum -- * > SHA256SUMS

      - name: Finalize GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: CognitiveOS ${{ github.event.workflow_run.head_branch }}
          body: |
            ## CognitiveOS ${{ github.event.workflow_run.head_branch }}

            ### Artifacts
            - `cognitiveos-*.iso` — bootable ISO images
            - `cognitiveos-*.img` — aarch64/armv7 images
            - `cognitiveos-alpine-distro-*.tar.gz` — portable tarballs
            - `SHA256SUMS` — integrity checksums

            ### Docker Images
            Published to `ghcr.io/cognitiveos-project/cognitiveos:VERSION-CLASS-ARCH`
            Example: `ghcr.io/cognitiveos-project/cognitiveos:${{ github.event.workflow_run.head_branch }}-standard-x86_64`

            ### Registry Packages
            Core components published as .cgp packages to the official CognitiveOS registry.
            Install via:
            ```
            cpm install cpm
            cpm install cognitiveosd
            cpm install cognitiveos-cli
            cpm install cognitiveos-inference
            ```
          files: output/*
