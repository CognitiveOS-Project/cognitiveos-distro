name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  shellcheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Run shellcheck
        uses: ludeeus/action-shellcheck@master
        with:
          scandir: ./scripts
          severity: warning

  build-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.24"
      - name: Verify each repo builds via its own Makefile
        run: |
          for repo in cpm cognitiveosd cli core-mcp-bridges; do
            echo "=== $repo ==="
            git clone --depth=1 "https://github.com/CognitiveOS-Project/${repo}.git" "/tmp/${repo}"
            cd "/tmp/${repo}"
            make build
            cd /tmp
          done
          echo "=== inference (mock backend, no llama.cpp) ==="
          git clone --depth=1 "https://github.com/CognitiveOS-Project/inference.git" "/tmp/inference"
          cd "/tmp/inference"
          make build-mock

  script-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Validate scripts syntax
        run: |
          for script in scripts/*.sh; do
            echo "Checking $script..."
            sh -n "$script"
          done
          echo "All scripts pass syntax check"

  image-build:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - name: Build ISO via Docker
        run: |
          mkdir -p output
          sh scripts/build-image.sh --profile x86_64
