name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  shellcheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Run shellcheck
        uses: ludeeus/action-shellcheck@v0.11.0
        with:
          scandir: ./scripts
          severity: warning


  build-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.24"
      - name: Verify each repo builds via its own Makefile
        run: make verify-repos

  script-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Validate scripts syntax
        run: |
          for script in scripts/*.sh; do
            echo "Checking $script..."
            sh -n "$script"
          done
          echo "All scripts pass syntax check"

  image-build:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - name: Build dev Docker image
        run: make docker.dev


