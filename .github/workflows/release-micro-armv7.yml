name: Release micro-armv7

on:
  push:
    tags: ['v*']
  workflow_dispatch:
    inputs:
      version:
        description: 'Release version (e.g. 0.4.0)'
        required: true

permissions:
  contents: write
  packages: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.24"
      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      - name: Build release assets
        env:
          CGO_ENABLED: "1"
        run: make release-variant ARCH=armv7 CLASS=micro
      - name: Build Docker image
        env:
          CGO_ENABLED: "1"
        run: make docker-release-arch ARCH=armv7 CLASS=micro
      - name: Push Docker image
        run: make docker-push-arch ARCH=armv7 CLASS=micro
      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: distro-micro-armv7
          path: output/
      - name: Publish .cgp packages to registry
        env:
          REGISTRY_URL: ${{ secrets.REGISTRY_URL || 'https://registry-us-all-distros-official.cognitive-os.org/v1' }}
          REGISTRY_TOKEN: ${{ secrets.REGISTRY_TOKEN }}
        run: make publish-all-safe

  release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          name: distro-micro-armv7
          path: output/
      - name: Generate checksums
        working-directory: output
        run: sha256sum -- * > SHA256SUMS
      - name: Append to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: CognitiveOS ${{ github.ref_name }}
          body: |
            ## CognitiveOS ${{ github.ref_name }}
            ### armv7 Artifacts
            - `cognitiveos-*.img` — armv7 Raspberry Pi image
            - `cognitiveos-distro-*.tar.gz` — portable distro tarball
            - `SHA256SUMS` — integrity checksums
            ### Docker Image
            Published to `ghcr.io/cognitiveos-project/cognitiveos:${{ github.ref_name }}-micro-armv7`
            ```
            docker pull ghcr.io/cognitiveos-project/cognitiveos:${{ github.ref_name }}-micro-armv7
            ```
          files: output/*
